<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easy Pizza - Panel de Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="estilos.css">
</head>
<body class="bg-slate-950 h-screen flex flex-col overflow-hidden text-slate-200">

    <nav class="bg-slate-900/80 backdrop-blur-md border-b border-slate-800 shadow-2xl z-50">
        <div class="max-w-7xl mx-auto px-6">
            <div class="flex space-x-10 h-16 items-center">
                
                <div class="text-red-700 font-black italic text-2xl tracking-tighter mr-4">
                    EASY PIZZA
                </div>

                <div class="relative group">
                    <button class="text-slate-400 hover:text-red-700 font-bold text-xs uppercase tracking-widest transition">Catálogos</button>
                    <div class="absolute hidden group-hover:block bg-slate-900 border border-slate-800 shadow-2xl mt-0 w-56 rounded-b-xl overflow-hidden">
                        <a href="#" onclick="abrirSeccion('Gestión de Repartidores', 'repartidores.html')" class="block px-6 py-3 hover:bg-red-700 hover:text-white transition">Repartidores</a>
                        <a href="#" onclick="abrirSeccion('Cartera de Clientes', 'clientes.html')" class="block px-6 py-3 hover:bg-red-700 hover:text-white transition">Clientes</a>
                        <a href="#" onclick="abrirSeccion('Control de Pedidos', 'pedidos.html')" class="block px-6 py-3 hover:bg-red-700 hover:text-white transition">Pedidos</a>
                        <div class="border-t border-slate-800"></div>
                        <a href="#" onclick="confirmarSalida()" class="block px-6 py-3 hover:bg-red-600 hover:text-white text-red-500 font-bold transition">Cerrar Sesión</a>
                    </div>
                </div>

                <div class="relative group">
                    <button class="text-slate-400 hover:text-red-700 font-bold text-xs uppercase tracking-widest transition">Procesos</button>
                    <div class="absolute hidden group-hover:block bg-slate-900 border border-slate-800 shadow-2xl mt-0 w-56 rounded-b-xl overflow-hidden">
                        <a href="#" onclick="abrirSeccion('Cálculo de Bonos', 'bonos.html')" class="block px-6 py-3 hover:bg-red-700 hover:text-white transition">Bonos de Repartidor</a>
                        <a href="#" onclick="abrirSeccion('Corte de Caja', 'ganancias.html')" class="block px-6 py-3 hover:bg-red-700 hover:text-white transition">Ganancias</a>
                    </div>
                </div>

                <div class="relative group">
                    <button class="text-slate-400 hover:text-red-700 font-bold text-xs uppercase tracking-widest transition">Consultas</button>
                    <div class="absolute hidden group-hover:block bg-slate-900 border border-slate-800 shadow-2xl mt-0 w-56 rounded-b-xl overflow-hidden">
                        <a href="#" onclick="abrirSeccion('Reporte de Bonos', 'consultas.html')" class="block px-6 py-3 hover:bg-red-700 hover:text-white transition">Repartidores con Bono</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main id="contenido-principal" class="grow flex items-center justify-center bg-pizza-dark relative">
        
        <div id="vista-bienvenida" class="relative z-0 text-center">
            <h1 class="text-8xl font-black text-red-700 italic tracking-tighter drop-shadow-[0_0_25px_rgba(249,115,22,0.4)]">
                EASY PIZZA
            </h1>
            <p class="mt-4 text-slate-400 font-bold uppercase tracking-[0.3em] text-sm">Panel de Administración v2.0</p>
            <div class="h-1 w-32 bg-red-700 mx-auto mt-6 rounded-full shadow-[0_0_15px_#ea580c]"></div>
        </div>

        <div id="ventana-dinamica" class="hidden relative z-10 glass-panel rounded-2xl shadow-[0_20px_50px_rgba(0,0,0,0.5)] w-11/12 max-w-5xl overflow-hidden transition-all duration-300">
            <div class="bg-slate-800/80 text-white px-6 py-4 flex justify-between items-center border-b border-slate-700">
                <span id="titulo-ventana" class="font-black italic uppercase text-xs tracking-[0.2em] text-red-700"></span>
                <button onclick="cerrarVentana()" class="text-slate-400 hover:text-red-500 transition-all text-3xl leading-none">&times;</button>
            </div>
            <div id="cuerpo-ventana" class="bg-transparent overflow-hidden">
                </div>
        </div>
    </main>

    <script>
        function abrirSeccion(nombre, archivo) {
            document.getElementById('vista-bienvenida').classList.add('hidden');
            const ventana = document.getElementById('ventana-dinamica');
            const titulo = document.getElementById('titulo-ventana');
            const cuerpo = document.getElementById('cuerpo-ventana');

            ventana.classList.remove('hidden');
            titulo.innerText = nombre;

            // Inyectamos el iframe y le decimos que al cargar ejecute ajustarAltura()
            cuerpo.innerHTML = `<iframe id="iframe-modulo" src="${archivo}" class="w-full bg-transparent border-none block" onload="ajustarAltura()"></iframe>`;
        }

        function ajustarAltura() {
            const iframe = document.getElementById('iframe-modulo');
            if (iframe) {
                // Obtenemos la altura del contenido interno del archivo cargado
                const alturaContenido = iframe.contentWindow.document.body.scrollHeight;
                // Aplicamos esa altura al iframe para que no aparezca el scrollbar interno
                iframe.style.height = (alturaContenido + 40) + "px";
            }
        }

        function cerrarVentana() {
            document.getElementById('ventana-dinamica').classList.add('hidden');
            document.getElementById('vista-bienvenida').classList.remove('hidden');
            document.getElementById('cuerpo-ventana').innerHTML = "";
        }

        function confirmarSalida() {
    // Cambiamos el destino a index.html
    if (confirm("¿En verdad desea cerrar la sesión?")) {
        window.location.href = "index.html"; 
    }
}
    </script>
</body>
</html>
