<script>
    // Definimos la base de la ruta igual que en el login
    const API_URL = "/api/repartidores";

    function getFormData() {
        return {
            // id_pizzeria suele ser 1 por defecto en tu base de datos
            id_pizzeria: document.getElementById('id_pizzeria').value || 1,
            nombre: document.getElementById('nombre').value,
            apellidos: document.getElementById('apellidos').value,
            tel: document.getElementById('tel').value,
            sueldo: document.getElementById('sueldo').value
        };
    }

    // REGISTRAR (POST) - Misma lógica que tu login
    async function registrar() {
        const data = getFormData();
        try {
            const res = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await res.json();
            alert(result.message || "Operación finalizada");
            if (res.ok) limpiar();
        } catch (err) { 
            alert("Error de conexión con el servidor"); 
        }
    }

    // CONSULTAR (GET con ID)
    async function consultar() {
        const id = document.getElementById('id_repartidor').value;
        if (!id) return alert("Ingresa el ID para buscar");
        try {
            const res = await fetch(`${API_URL}/${id}`);
            const d = await res.json();
            
            if (res.ok && d) {
                document.getElementById('id_pizzeria').value = d.id_pizzeria;
                document.getElementById('nombre').value = d.nombre;
                document.getElementById('apellidos').value = d.apellidos;
                document.getElementById('tel').value = d.tel;
                document.getElementById('sueldo').value = d.sueldo;
            } else { 
                alert("Repartidor no encontrado"); 
            }
        } catch (err) { 
            alert("Error al consultar"); 
        }
    }

    // MODIFICAR (PUT)
    async function modificar() {
        const id = document.getElementById('id_repartidor').value;
        if (!id) return alert("ID necesario para modificar");
        
        const data = getFormData();
        try {
            const res = await fetch(`${API_URL}/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await res.json();
            alert(result.message || "Datos actualizados");
        } catch (err) { 
            alert("Error al modificar"); 
        }
    }

    // ELIMINAR (DELETE)
    async function eliminar() {
        const id = document.getElementById('id_repartidor').value;
        if (!id) return alert("ID necesario");
        if (!confirm("¿Seguro que deseas eliminarlo?")) return;
        
        try {
            const res = await fetch(`${API_URL}/${id}`, { 
                method: 'DELETE' 
            });
            const result = await res.json();
            alert(result.message || "Eliminado");
            limpiar();
        } catch (err) { 
            alert("Error al eliminar"); 
        }
    }

    function limpiar() {
        document.getElementById('form-repartidores').reset();
    }
</script>
