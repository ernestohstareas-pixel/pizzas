<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Easy Pizza - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="estilos.css">
</head>
<body class="bg-slate-950 flex items-center justify-center min-h-screen">

    <div class="bg-slate-900/50 backdrop-blur-md p-8 rounded-2xl shadow-2xl w-full max-w-md border border-slate-800">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-black text-red-700 tracking-tighter italic">EASY PIZZA</h1>
            <div class="h-1 w-20 bg-red-700 mx-auto mt-2 rounded-full"></div>
            <p class="text-slate-400 mt-4 text-sm uppercase tracking-widest font-bold">Control de Acceso</p>
        </div>

        <form id="loginForm" class="space-y-6">
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase mb-2 ml-1">Correo Electrónico</label>
                <input type="email" id="email" required 
                       class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-white focus:border-red-500 focus:ring-1 focus:ring-red-500 outline-none transition-all placeholder-slate-500"
                       placeholder="Ingresa tu correo">
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase mb-2 ml-1">Contraseña</label>
                <input type="password" id="pass" required 
                       class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-white focus:border-red-500 focus:ring-1 focus:ring-red-500 outline-none transition-all placeholder-slate-500"
                       placeholder="••••••••">
            </div>

            <button type="submit" 
                    class="w-full bg-red-600 hover:bg-red-700 text-white font-black py-4 rounded-xl shadow-lg shadow-red-700/20 transform active:scale-95 transition-all uppercase tracking-widest">
                Entrar al Sistema
            </button>
        </form>

        <div class="mt-8 text-center border-t border-slate-800 pt-6">
            <p class="text-slate-500 text-sm">
                ¿Nuevo usuario? <a href="registro.html" class="text-red-700 font-bold hover:text-red-400 transition">Crea una cuenta aquí</a>
            </p>
        </div>
    </div>

    <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        // CORRECCIÓN: Usamos el ID "email" que definimos arriba
        const correo = document.getElementById('email').value; 
        const password = document.getElementById('pass').value;

        try {
            const res = await fetch('http://localhost:8080/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ correo, password })
            });

            const data = await res.json();

            if (res.ok && data.success) {
                // Asegúrate de que menuPrincipal.html esté en src/public
                window.location.href = 'menuPrincipal.html';
            } else {
                alert("❌ " + (data.error || "Usuario no encontrado"));
            }
        } catch (error) {
            alert("❌ El servidor Node.js no está respondiendo en el puerto 5000.");
        }
    });
    </script>
</body>
</html>
