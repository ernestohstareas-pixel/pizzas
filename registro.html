<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Easy Pizza - Registro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 flex items-center justify-center min-h-screen p-4">
    <div class="bg-slate-900/50 backdrop-blur-md p-8 rounded-2xl shadow-2xl w-full max-w-2xl border border-slate-800">
        <h2 class="text-2xl font-black text-white uppercase italic mb-6">Alta de Pizzería</h2>
        <form id="registroForm" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="md:col-span-2">
                <label class="block text-xs font-bold text-slate-400 uppercase mb-2">ID Pizzería</label>
                <input type="number" id="id_pizzeria" required class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-white outline-none focus:border-red-600">
            </div>
            <div class="md:col-span-2">
                <label class="block text-xs font-bold text-slate-400 uppercase mb-2">Email Administrador</label>
                <input type="email" id="email" required class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-white outline-none focus:border-red-600">
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase mb-2">Contraseña</label>
                <input type="password" id="pass1" required class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-white outline-none focus:border-red-600">
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase mb-2">Confirmar</label>
                <input type="password" id="pass2" required class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-white outline-none focus:border-red-600">
            </div>
            <div class="md:col-span-2 pt-4">
                <button type="submit" class="w-full bg-red-700 hover:bg-red-600 text-white font-black py-4 rounded-xl uppercase tracking-widest transition-all">Registrar</button>
            </div>
        </form>
        <p class="mt-6 text-slate-500 text-sm text-center">
            <a href="index.html" class="text-red-700 font-bold hover:text-red-400">Volver al Login</a>
        </p>
    </div>
    <script>
        document.getElementById('registroForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const pass1 = document.getElementById('pass1').value;
            const pass2 = document.getElementById('pass2').value;
            if (pass1 !== pass2) return alert("⚠️ Las contraseñas no coinciden");
            const datos = {
                id_pizzeria: document.getElementById('id_pizzeria').value,
                correo_admin: document.getElementById('email').value,
                password_hash: pass1
            };
            try {
                const res = await fetch('http://localhost:5000/usuarios', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(datos)
                });
                if (res.ok) {
                    alert("✅ Registrado");
                    window.location.href = 'index.html';
                } else {
                    const err = await res.json();
                    alert("❌ Error: " + err.error);
                }
            } catch (error) {
                alert("❌ Sin conexión");
            }
        });
    </script>
</body>
</html>
